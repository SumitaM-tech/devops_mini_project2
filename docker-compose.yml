version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: devops-mini-app
    ports:
      - "4500:4500"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - PORT=4500
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4500/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - app-net

  nginx:
    image: nginx:1.25-alpine
    container_name: devops-mini-nginx
    ports:
      - "9090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge