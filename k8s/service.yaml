apiVersion: v1
kind: Service
metadata:
  name: devops-mini-project-svc
  labels:
    app: devops-mini-project
spec:
  type: NodePort
  selector:
    app: devops-mini-project
  ports:
    - protocol: TCP
      port: 4500          # ClusterIP port
      targetPort: 4500    # Container port
      nodePort: 32500     # External NodePort (30000–32767)